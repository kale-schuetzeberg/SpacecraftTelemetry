name: DNS & Frontend Deploy

on:
  workflow_call:
    inputs:
      DOMAIN:
        required: true
        type: string
      S3_PREFIX:
        required: true
        type: string
      FRONTEND_BUCKET:
        required: true
        type: string
      CLOUDFRONT_DIST_ID:
        required: true
        type: string
      ALB_HOSTNAME:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Update Route53 CNAME
        run: |
          aws route53 change-resource-record-sets \
            --hosted-zone-id ${{ secrets.HOSTED_ZONE_ID }} \
            --change-batch '{
              "Changes": [{
                "Action": "UPSERT",
                "ResourceRecordSet": {
                  "Name": "'"${{ inputs.DOMAIN }}"'",
                  "Type": "CNAME",
                  "TTL": 60,
                  "ResourceRecords": [{"Value": "'"${{ inputs.ALB_HOSTNAME }}"'"}]
                }
              }]
            }'

      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ inputs.FRONTEND_BUCKET }}/${{ inputs.S3_PREFIX }}/
          aws cloudfront create-invalidation --distribution-id ${{ inputs.CLOUDFRONT_DIST_ID }} --paths "/*"
