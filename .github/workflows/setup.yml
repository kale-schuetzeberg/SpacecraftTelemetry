---
name: Setup

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      branch:
        required: false
        type: string
      teardown:
        required: true
        type: boolean
    outputs:
      IMAGE_TAG:
        description: "Docker image tag"
        value: ${{ jobs.setup_job.outputs.IMAGE_TAG }}
      K8S_NAMESPACE:
        description: "K8s namespace"
        value: ${{ jobs.setup_job.outputs.K8S_NAMESPACE }}
      S3_PREFIX:
        description: "S3 prefix for frontend"
        value: ${{ jobs.setup_job.outputs.S3_PREFIX }}
      FRONTEND_BUCKET:
        description: "Frontend S3 bucket"
        value: ${{ jobs.setup_job.outputs.FRONTEND_BUCKET }}
      DOMAIN:
        description: "Base domain"
        value: ${{ jobs.setup_job.outputs.DOMAIN }}
      TF_VARS_FILE:
        description: "Terraform vars file path"
        value: ${{ jobs.setup_job.outputs.TF_VARS_FILE }}
      TEARDOWN:
        description: "Whether this is a teardown run"
        value: ${{ jobs.setup_job.outputs.TEARDOWN }}

jobs:
  setup_job:
    runs-on: ubuntu-latest
    outputs:
      IMAGE_TAG: ${{ steps.set.outputs.IMAGE_TAG }}
      K8S_NAMESPACE: ${{ steps.set.outputs.K8S_NAMESPACE }}
      S3_PREFIX: ${{ steps.set.outputs.S3_PREFIX }}
      FRONTEND_BUCKET: ${{ steps.set.outputs.FRONTEND_BUCKET }}
      DOMAIN: ${{ steps.set.outputs.DOMAIN }}
      TF_VARS_FILE: ${{ steps.set.outputs.TF_VARS_FILE }}
      TEARDOWN: ${{ steps.set.outputs.TEARDOWN }}
    steps:
      - name: Set Variables
        id: set
        run: |
          echo "IMAGE_TAG=$(date +%s)" >> $GITHUB_OUTPUT
          echo "K8S_NAMESPACE=${{ inputs.branch || inputs.environment }}" \
            >> $GITHUB_OUTPUT
          echo "S3_PREFIX=${{ inputs.branch || inputs.environment }}" \
            >> $GITHUB_OUTPUT
          echo "FRONTEND_BUCKET=my-frontend-bucket" >> $GITHUB_OUTPUT
          echo "DOMAIN=spacecraft-api.nodenavi.com" >> $GITHUB_OUTPUT
          echo "TF_VARS_FILE=terraform/${{ inputs.environment }}.tfvars" \
            >> $GITHUB_OUTPUT
          echo "TEARDOWN=${{ inputs.teardown }}" >> $GITHUB_OUTPUT
