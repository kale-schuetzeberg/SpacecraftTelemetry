---
name: Terraform Plan and Apply
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy infrastructure to'
        required: true
        type: choice
        options:
          - dev
          - prod

jobs:
  terraform-plan-apply:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ./terraform
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config=environments/${{ inputs.environment }}/backend.hcl
      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file=environments/${{ inputs.environment }}/terraform.tfvars \
            -out=tfplan-apply
      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v7
        with:
          name: terraform-plan-apply
          path: terraform/tfplan-apply
  terraform-apply:
    runs-on: ubuntu-latest
    needs: terraform-plan-apply
    defaults:
      run:
        working-directory: ./terraform
    permissions:
      id-token: write
      contents: read
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config=environments/${{ inputs.environment }}/backend.hcl
      - name: Download Terraform Plan
        uses: actions/download-artifact@v8
        with:
          name: terraform-plan-apply
          path: terraform
      - name: Terraform Apply
        run: |
          terraform apply tfplan-apply
      - name: Update GitHub environment variables
        env:
          GH_TOKEN: ${{ secrets.GH_ENV_VARS_PAT_KALE }}
        run: |
          gh variable set VPC_ID \
            --repo ${{ github.repository }} \
            --env ${{ inputs.environment }} \
            --body "$(terraform output -raw vpc_id)"
          gh variable set ACM_CERTIFICATE_ARN \
            --repo ${{ github.repository }} \
            --env ${{ inputs.environment }} \
            --body "$(terraform output -raw acm_certificate_arn)"
          gh variable set CLOUDFRONT_DISTRIBUTION_ID \
            --repo ${{ github.repository }} \
            --env ${{ inputs.environment }} \
            --body "$(terraform output -raw cloudfront_distribution_id)"
