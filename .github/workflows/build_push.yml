---
name: Build & Push

on:
  workflow_call:
    inputs:
      IMAGE_TAG:
        required: true
        type: string

jobs:
  build_push_job:
    runs-on: ubuntu-latest
    outputs:
      IMAGE_TAG: ${{ steps.set_tag.outputs.IMAGE_TAG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set image tag
        id: set_tag
        run: |
          echo "IMAGE_TAG=${{ inputs.IMAGE_TAG }}" >> $GITHUB_OUTPUT

      - name: Build backend Docker image
        run: |
          docker build -t my-backend:${{ inputs.IMAGE_TAG }} ./backend
          docker tag my-backend:${{ inputs.IMAGE_TAG }} \
            ${{ secrets.ECR_REGISTRY }}/ \
            ${{ secrets.ECR_REPO }}:${{ inputs.IMAGE_TAG }}
          aws ecr get-login-password --region us-east-1 \
            | docker login --username AWS --password-stdin \
            ${{ secrets.ECR_REGISTRY }}
          docker push ${{ secrets.ECR_REGISTRY }}/\
            ${{ secrets.ECR_REPO }}:${{ inputs.IMAGE_TAG }}

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build
