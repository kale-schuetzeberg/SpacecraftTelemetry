---
name: Deploy

on:
  push:
    branches: [main, dev, 'feature/*']

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build, Tag, and Push Docker Image to Amazon ECR
        run: |
          docker build -t \
              ${{ vars.ECR_REPOSITORY_URL }}:${{ github.sha }} ./backend
          docker push ${{ vars.ECR_REPOSITORY_URL }}:${{ github.sha }}
      - name: Update kubeconfig - connect kubectl to cluster
        run: |
          aws eks update-kubeconfig --region ${{ vars.AWS_REGION }} \
            --name ${{ vars.EKS_CLUSTER_NAME }}
      - name: Install AWS Load Balancer Controller
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --set clusterName=${{ vars.EKS_CLUSTER_NAME }} \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=${{ vars.ALB_CONTROLLER_ROLE_ARN }} \
            --set vpcId=${{ vars.VPC_ID }} \
            --set region=${{ vars.AWS_REGION }}
      - name: Apply Kubernetes manifests
        run: |
          CONTAINER_NAME="spacecraft-telemetry-backend"
          sed -i "s|ACM_CERTIFICATE_ARN_PLACEHOLDER|${{ vars.ACM_CERTIFICATE_ARN }}|g" k8s/ingress.yaml
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/
          kubectl set image deployment/spacecraft-telemetry-deployment \
            $CONTAINER_NAME=${{ vars.ECR_REPOSITORY_URL }}:${{ github.sha }} \
              -n spacecraft-telemetry
          kubectl rollout status deployment/spacecraft-telemetry-deployment \
              -n spacecraft-telemetry --timeout=5m
      - name: Poll Ingress for ALB hostname
        id: poll-ingress
        run: |
          timeout 5m bash -c '
            while true; do
              hostname=$(kubectl -n spacecraft-telemetry \
                get ingress -o \
                  jsonpath="{.items[0].status.loadBalancer.ingress[0].hostname}")
              if [ -n "$hostname" ]; then
                echo "Ingress hostname: $hostname"
                echo "hostname=$hostname" >> $GITHUB_OUTPUT
                exit 0
              fi
              echo "Waiting for Ingress hostname..."
              sleep 10
            done
          '
      - name: Upsert Route53 CNAME → ALB hostname
        run: |
          aws route53 change-resource-record-sets \
            --hosted-zone-id ${{ vars.ROUTE53_HOSTED_ZONE_ID }} \
            --change-batch '{
              "Changes": [{
                "Action": "UPSERT",
                "ResourceRecordSet": {
                  "Name": "${{ vars.BACKEND_SUBDOMAIN }}",
                  "Type": "CNAME",
                  "TTL": 300,
                  "ResourceRecords":
                    [{"Value": "${{ steps.poll-ingress.outputs.hostname }}"}]
                }
              }]
            }'
      - name: Install Frontend Dependencies and Build
        working-directory: ./frontend
        env:
          VITE_WEBSOCKET_URL: wss://${{ vars.BACKEND_SUBDOMAIN }}/ws/telemetry
        run: |
          npm ci
          npm run build
      - name: Sync Frontend to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ vars.S3_BUCKET_NAME }}/ --delete
      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id \
              ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
